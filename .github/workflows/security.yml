on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  checkmarx-one-sast:
    name: Checkmarx One SAST
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate CX_TENANT secret formatting
        shell: bash
        run: |
          if [ -z "${{ secrets.CX_TENANT }}" ]; then
            echo "CX_TENANT is empty"; exit 1
          fi
          echo "CX_TENANT length: ${#CX_TENANT}"
        env:
          CX_TENANT: ${{ secrets.CX_TENANT }}
    
      - name: Run Checkmarx One Scan
        uses: Checkmarx/ast-github-action@2.3.36
        with:
          base_uri: "https://ast.checkmarx.net"
          cx_tenant: ${{ secrets.CX_TENANT }}
          cx_client_id: ${{ secrets.CX_CLIENT_ID }}
          cx_client_secret: ${{ secrets.CX_CLIENT_SECRET }}
          project_name: ${{ github.repository }}
          branch: ${{ github.ref_name }}
          scan_params: --scan-types sast
